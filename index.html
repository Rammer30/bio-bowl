  }, [gameRunning]);

  useEffect(() => {
    if (qTimerRunning && qTimeLeft > 0) qTimerRef.current = setInterval(() => setQTimeLeft(t => t-1), 1000);
    else { clearInterval(qTimerRef.current); if (qTimeLeft === 0 && qTimerRunning) setQTimerRunning(false); }
    return () => clearInterval(qTimerRef.current);
  }, [qTimerRunning, qTimeLeft]);

  const handleDifficultyChange = (d) => { setDifficulty(d); setCategories(selectedCats.map(n => buildCategory(n, d))); };
  const handleCatChange = (idx, newName) => { const u = [...selectedCats]; u[idx] = newName; setSelectedCats(u); const c = [...categories]; c[idx] = buildCategory(newName, difficulty); setCategories(c); };

  const placeDailyDoubles = useCallback(() => {
    const cats = clone(categories);
    cats.forEach(c => c.questions.forEach(q => q.isDailyDouble = false));
    let placed = 0, attempts = 0;
    while (placed < dailyDoubleCount && attempts < 200) {
      const ci = Math.floor(Math.random() * cats.length), qi = Math.floor(Math.random() * cats[ci].questions.length);
      if (!cats[ci].questions[qi].isDailyDouble && qi > 0) { cats[ci].questions[qi].isDailyDouble = true; placed++; }
      attempts++;
    }
    setCategories(cats);
  }, [categories, dailyDoubleCount]);

  const startGame = () => { placeDailyDoubles(); setGamePhase("playing"); setGameRunning(true); setGameTime(0); setQuestionsAnswered(0); };
  const openQuestion = (ci, qi) => {
    const q = categories[ci].questions[qi]; if (q.revealed) return;
    setCurrentQ({ ci, qi, ...q }); setShowAnswer(false); setSelectedTeam(null); setQTimeLeft(qTimerDuration); setQTimerRunning(false);
    if (q.isDailyDouble) { setDdWagerPhase(true); setDdWager(0); } else setDdWagerPhase(false);
  };
  const markRevealed = () => { if (!currentQ) return; const c = [...categories]; c[currentQ.ci].questions[currentQ.qi].revealed = true; setCategories(c); setQuestionsAnswered(q => q+1); };
  const scoreAnswer = (correct) => {
    if (!selectedTeam) return;
    const pts = currentQ.isDailyDouble && ddWager > 0 ? ddWager : currentQ.value;
    setTeams(prev => prev.map(t => { if (t.id !== selectedTeam) return t; return correct ? {...t, score: t.score+pts} : (deductOnWrong ? {...t, score: t.score-pts} : t); }));
    markRevealed(); setCurrentQ(null); setQTimerRunning(false); setDdWagerPhase(false);
  };
  const skipQuestion = () => { markRevealed(); setCurrentQ(null); setQTimerRunning(false); setDdWagerPhase(false); };
  const adjustScore = (tid, amt) => setTeams(prev => prev.map(t => t.id === tid ? {...t, score: t.score+amt} : t));
  const setScoreDirect = (tid, val) => { const n = parseInt(val); if (!isNaN(n)) setTeams(prev => prev.map(t => t.id === tid ? {...t, score: n} : t)); setShowScoreEdit(null); };
  const startFinalJeopardy = () => { setGamePhase("final"); setFinalPhase("category"); setFinalWagers({}); setTeams(prev => prev.map(t => ({...t, finalWager: 0, finalCorrect: null}))); };

  // ═══════════ SETUP ═══════════
  if (gamePhase === "setup") {
    return (
      <div style={{...S.page, padding: "24px 16px"}}>
        <div style={{maxWidth: 940, margin: "0 auto"}}>
          <div style={{textAlign:"center", marginBottom: 32}}>
            <h1 style={{fontSize:52, fontWeight:900, margin:0, letterSpacing:2, background:"linear-gradient(135deg, #2563eb, #16a34a, #dc2626, #ca8a04)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent"}}>🧬 Bio Bowl</h1>
            <p style={{color:"#94a3b8", fontSize:15, margin:"6px 0 0"}}>Science Jeopardy — Configure &amp; Launch</p>
          </div>

          {/* Difficulty */}
          <div style={{...S.card, padding:"16px 20px", marginBottom:16, display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:12}}>
            <div><div style={{fontWeight:800, fontSize:16}}>Difficulty Level</div><div style={{fontSize:13, color:"#94a3b8"}}>Easy = K–5th &nbsp;|&nbsp; Standard = 6th–10th</div></div>
            <div style={{display:"flex", borderRadius:10, overflow:"hidden", border:"2px solid #e2e8f0"}}>
              <button onClick={() => handleDifficultyChange("easy")} style={{padding:"10px 24px", border:"none", fontWeight:800, fontSize:15, cursor:"pointer", background:difficulty==="easy"?"#22c55e":"#fff", color:difficulty==="easy"?"#fff":"#64748b", transition:"all 0.2s", fontFamily:"inherit"}}>🌱 Easy Mode</button>
              <button onClick={() => handleDifficultyChange("standard")} style={{padding:"10px 24px", border:"none", fontWeight:800, fontSize:15, cursor:"pointer", background:difficulty==="standard"?"#2563eb":"#fff", color:difficulty==="standard"?"#fff":"#64748b", transition:"all 0.2s", fontFamily:"inherit"}}>🔬 Standard</button>
            </div>
          </div>

          {/* Teams */}
          <div style={{...S.card, padding:20, marginBottom:16}}>
            <div style={{fontWeight:800, fontSize:16, marginBottom:14}}>Teams</div>
            <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(190px, 1fr))", gap:10}}>
              {teams.map((t,i) => { const c = TEAM_COLORS[t.color]; return (
                <div key={t.id} style={{background:t.active?c.bg:"#f1f5f9", borderRadius:10, padding:14, border:"2px solid "+(t.active?c.border:"#e2e8f0"), opacity:t.active?1:0.45, transition:"all 0.2s"}}>
                  <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8}}>
                    <span style={{fontSize:11, fontWeight:700, color:c.dark, textTransform:"uppercase", letterSpacing:1}}>Team {i+1}</span>
                    <label style={{cursor:"pointer", fontSize:13, color:"#64748b", display:"flex", alignItems:"center", gap:4}}><input type="checkbox" checked={t.active} onChange={() => setTeams(p => p.map(x => x.id===t.id?{...x,active:!x.active}:x))} /> Active</label>
                  </div>
                  <input value={t.name} onChange={e => setTeams(p => p.map(x => x.id===t.id?{...x,name:e.target.value}:x))} style={{...S.input, fontWeight:700, fontSize:16, color:c.dark, borderColor:c.border}} />
                </div>
              ); })}
            </div>
          </div>

          {/* Settings */}
          <div style={{...S.card, padding:20, marginBottom:16}}>
            <div style={{fontWeight:800, fontSize:16, marginBottom:14}}>Game Settings</div>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:14}}>
              <div><label style={S.label}>Daily Doubles</label><select value={dailyDoubleCount} onChange={e => setDailyDoubleCount(Number(e.target.value))} style={S.select}>{[0,1,2,3,4,5].map(n => <option key={n} value={n}>{n}</option>)}</select></div>
              <div><label style={S.label}>Max DD Wager</label><input type="number" value={ddMaxWager} onChange={e => setDdMaxWager(Number(e.target.value))} style={S.input} /></div>
              <div><label style={S.label}>Question Timer</label><select value={qTimerDuration} onChange={e => setQTimerDuration(Number(e.target.value))} style={S.select}>{[10,15,20,30,45,60].map(n => <option key={n} value={n}>{n} seconds</option>)}</select></div>
            </div>
            <div style={{marginTop:12}}><label style={{cursor:"pointer", fontSize:14, color:"#475569", display:"flex", alignItems:"center", gap:6}}><input type="checkbox" checked={deductOnWrong} onChange={() => setDeductOnWrong(!deductOnWrong)} /> Deduct points on incorrect answers</label></div>
          </div>

          {/* Categories */}
          <div style={{...S.card, padding:20, marginBottom:16}}>
            <div style={{fontWeight:800, fontSize:16, marginBottom:14}}>Categories &amp; Questions</div>
            {categories.map((cat, ci) => (
              <div key={ci} style={{marginBottom:12, background:"#f8fafc", borderRadius:10, border:"1px solid #e2e8f0", overflow:"hidden"}}>
                <div style={{display:"flex", alignItems:"center", gap:10, padding:"10px 14px"}}>
                  <span style={{fontWeight:800, color:"#64748b", fontSize:13, minWidth:18}}>{ci+1}.</span>
                  <select value={selectedCats[ci]} onChange={e => handleCatChange(ci, e.target.value)} style={{...S.select, flex:1, fontWeight:700, fontSize:15}}>{CATEGORY_NAMES.map(n => <option key={n} value={n}>{n}</option>)}</select>
                  <button onClick={() => setEditingCat(editingCat===ci?null:ci)} style={{...S.btnGhost, fontSize:12, padding:"6px 12px"}}>{editingCat===ci?"▲ Close":"✏️ Edit Qs"}</button>
                </div>
                {editingCat === ci && <div style={{padding:"0 14px 14px"}}>
                  <div style={{marginBottom:10}}><label style={S.label}>Display Name</label><input value={cat.name} onChange={e => { const c=[...categories]; c[ci].name=e.target.value; setCategories(c); }} style={{...S.input, fontWeight:700}} /></div>
                  {cat.questions.map((q, qi) => (
                    <div key={qi} style={{background:"#fff", borderRadius:8, padding:10, marginBottom:6, border:"1px solid #e2e8f0"}}>
                      <div style={{display:"flex", gap:8, marginBottom:6}}>
                        <div style={{minWidth:72}}><label style={{...S.label, fontSize:10}}>Points</label><input type="number" value={q.value} onChange={e => { const c=[...categories]; c[ci].questions[qi].value=Number(e.target.value); setCategories(c); }} style={{...S.input, fontWeight:800, color:"#ca8a04", fontSize:15, padding:"5px 8px"}} /></div>
                        <div style={{flex:1}}><label style={{...S.label, fontSize:10}}>Question</label><textarea value={q.question} onChange={e => { const c=[...categories]; c[ci].questions[qi].question=e.target.value; setCategories(c); }} rows={2} style={{...S.input, resize:"vertical", fontSize:13}} /></div>
                      </div>
                      <div style={{display:"flex", gap:8}}>
                        <div style={{flex:1}}><label style={{...S.label, fontSize:10}}>Answer</label><input value={q.answer} onChange={e => { const c=[...categories]; c[ci].questions[qi].answer=e.target.value; setCategories(c); }} style={{...S.input, color:"#16a34a", fontSize:13}} /></div>
                        <div style={{flex:1}}><label style={{...S.label, fontSize:10}}>Image URL</label><input value={q.imageUrl} onChange={e => { const c=[...categories]; c[ci].questions[qi].imageUrl=e.target.value; setCategories(c); }} style={{...S.input, fontSize:13}} placeholder="https://..." /></div>
                      </div>
                    </div>
                  ))}
                </div>}
              </div>
            ))}
          </div>

          {/* Final Jeopardy */}
          <div style={{...S.card, padding:20, marginBottom:20}}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, flexWrap:"wrap", gap:8}}>
              <div style={{fontWeight:800, fontSize:16}}>Final Jeopardy</div>
              <select value={finalBankIdx} onChange={e => { const idx=Number(e.target.value); setFinalBankIdx(idx); if(idx<FINAL_JEOPARDY_BANK.length){ setFinalCategory(FINAL_JEOPARDY_BANK[idx].category); setFinalQuestion(FINAL_JEOPARDY_BANK[idx].question); setFinalAnswer(FINAL_JEOPARDY_BANK[idx].answer); } }} style={{...S.select, width:"auto", maxWidth:300}}>
                {FINAL_JEOPARDY_BANK.map((fj,i) => <option key={i} value={i}>{fj.category}</option>)}
                <option value={99}>✏️ Custom</option>
              </select>
            </div>
            <div style={{display:"flex", flexDirection:"column", gap:10}}>
              <div><label style={S.label}>Category</label><input value={finalCategory} onChange={e => setFinalCategory(e.target.value)} style={{...S.input, fontWeight:700}} /></div>
              <div><label style={S.label}>Question</label><textarea value={finalQuestion} onChange={e => setFinalQuestion(e.target.value)} rows={2} style={{...S.input, resize:"vertical"}} /></div>
              <div><label style={S.label}>Answer</label><input value={finalAnswer} onChange={e => setFinalAnswer(e.target.value)} style={{...S.input, color:"#16a34a", fontWeight:700}} /></div>
            </div>
          </div>

          <button onClick={startGame} style={{...S.btnPrimary, width:"100%", padding:"18px", fontSize:22, letterSpacing:3, textTransform:"uppercase", borderRadius:14}}>🧬 Start Bio Bowl</button>
        </div>
      </div>
    );
  }

  // ═══════════ FINAL JEOPARDY ═══════════
  if (gamePhase === "final") {
    return (
      <div style={{...S.page, padding:24, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", minHeight:"100vh"}}>
        <h1 style={{fontSize:38, fontWeight:900, letterSpacing:2, marginBottom:4, background:"linear-gradient(135deg, #f97316, #eab308)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent"}}>⭐ Final Jeopardy ⭐</h1>
        <button onClick={() => setShowFinalEdit(!showFinalEdit)} style={{...S.btnGhost, marginBottom:16, fontSize:12}}>{showFinalEdit?"Close Editor":"✏️ Edit Final Q"}</button>
        {showFinalEdit && (
          <div style={{...S.card, padding:16, marginBottom:20, width:"100%", maxWidth:600}}>
            <div style={{marginBottom:8}}><label style={S.label}>Pick from bank</label><select value={finalBankIdx} onChange={e => { const idx=Number(e.target.value); setFinalBankIdx(idx); if(idx<FINAL_JEOPARDY_BANK.length){ setFinalCategory(FINAL_JEOPARDY_BANK[idx].category); setFinalQuestion(FINAL_JEOPARDY_BANK[idx].question); setFinalAnswer(FINAL_JEOPARDY_BANK[idx].answer); } }} style={S.select}>
              {FINAL_JEOPARDY_BANK.map((fj,i) => <option key={i} value={i}>{fj.category}</option>)}
              <option value={99}>✏️ Custom</option>
            </select></div>
            <div style={{display:"flex", flexDirection:"column", gap:8}}>
              <div><label style={S.label}>Category</label><input value={finalCategory} onChange={e => setFinalCategory(e.target.value)} style={S.input} /></div>
              <div><label style={S.label}>Question</label><textarea value={finalQuestion} onChange={e => setFinalQuestion(e.target.value)} rows={2} style={{...S.input, resize:"vertical"}} /></div>
              <div><label style={S.label}>Answer</label><input value={finalAnswer} onChange={e => setFinalAnswer(e.target.value)} style={{...S.input, color:"#16a34a"}} /></div>
            </div>
          </div>
        )}

        {finalPhase === "category" && (
          <div style={{textAlign:"center"}}>
            <p style={{color:"#94a3b8", marginBottom:16}}>The category is...</p>
            <div style={{fontSize:34, fontWeight:900, color:"#ca8a04", marginBottom:32, padding:"16px 32px", background:"#fefce8", borderRadius:12, border:"2px solid #fde047", animation:"ddGlow 2s ease-in-out infinite"}}>{finalCategory}</div>
            <p style={{fontSize:13, color:"#94a3b8", marginBottom:16}}>Have teams place their wagers now.</p>
            <div style={{display:"flex", gap:14, flexWrap:"wrap", justifyContent:"center", marginBottom:24}}>
              {activeTeams.map(t => { const c=TEAM_COLORS[t.color]; return (
                <div key={t.id} style={{background:c.bg, borderRadius:12, padding:14, minWidth:160, textAlign:"center", border:"2px solid "+c.border}}>
                  <div style={{fontWeight:800, color:c.dark, marginBottom:6}}>{t.name}: {t.score}</div>
                  <input type="number" min={0} max={Math.max(t.score,0)} placeholder="Wager" value={finalWagers[t.id]||""} onChange={e => setFinalWagers(p => ({...p, [t.id]: Math.min(Number(e.target.value), Math.max(t.score,0))}))} style={{...S.input, textAlign:"center", fontWeight:800, fontSize:16, color:c.dark}} />
                </div>
              ); })}
            </div>
            <button onClick={() => { setTeams(prev => prev.map(t => ({...t, finalWager: finalWagers[t.id]||0}))); setFinalPhase("question"); }} style={S.btnPrimary}>Reveal Question →</button>
          </div>
        )}

        {finalPhase === "question" && (
          <div style={{textAlign:"center", maxWidth:640}}>
            <div style={{fontSize:13, color:"#94a3b8", textTransform:"uppercase", letterSpacing:2, marginBottom:8}}>{finalCategory}</div>
            <div style={{...S.card, fontSize:22, fontWeight:600, lineHeight:1.6, padding:24, marginBottom:24}}>{finalQuestion}</div>
            <button onClick={() => setFinalPhase("answer")} style={{...S.btnPrimary, background:"linear-gradient(135deg, #7c3aed, #a855f7)"}}>Reveal Answer</button>
          </div>
        )}

        {finalPhase === "answer" && (
          <div style={{textAlign:"center", maxWidth:720, width:"100%"}}>
            <div style={{padding:16, background:"#f0fdf4", border:"2px solid #86efac", borderRadius:12, marginBottom:24, fontSize:24, fontWeight:800, color:"#15803d"}}>{finalAnswer}</div>
            <div style={{display:"flex", gap:14, flexWrap:"wrap", justifyContent:"center", marginBottom:24}}>
              {activeTeams.map(t => { const c=TEAM_COLORS[t.color]; return (
                <div key={t.id} style={{background:c.bg, borderRadius:12, padding:16, minWidth:170, textAlign:"center", border:"2px solid "+c.border}}>
                  <div style={{fontWeight:800, color:c.dark, fontSize:17}}>{t.name}</div>
                  <div style={{fontSize:12, color:"#94a3b8", marginBottom:8}}>Wagered: {t.finalWager}</div>
                  {t.finalCorrect === null ? (
                    <div style={{display:"flex", gap:8}}>
                      <button onClick={() => setTeams(p => p.map(x => x.id===t.id?{...x, score:x.score+x.finalWager, finalCorrect:true}:x))} style={{flex:1, padding:8, background:"#22c55e", border:"none", borderRadius:8, color:"#fff", fontWeight:800, cursor:"pointer", fontSize:16, fontFamily:"inherit"}}>✓</button>
                      <button onClick={() => setTeams(p => p.map(x => x.id===t.id?{...x, score:x.score-x.finalWager, finalCorrect:false}:x))} style={{flex:1, padding:8, background:"#ef4444", border:"none", borderRadius:8, color:"#fff", fontWeight:800, cursor:"pointer", fontSize:16, fontFamily:"inherit"}}>✗</button>
                    </div>
                  ) : (
                    <div style={{fontSize:22, fontWeight:900, color:t.finalCorrect?"#16a34a":"#dc2626"}}>{t.finalCorrect?"✓":"✗"} → {t.score}</div>
                  )}
                </div>
              ); })}
            </div>
            {activeTeams.every(t => t.finalCorrect !== null) && (
              <button onClick={() => { setGamePhase("gameover"); setGameRunning(false); }} style={{...S.btnPrimary, background:"linear-gradient(135deg, #f97316, #eab308)", color:"#000", padding:"14px 40px", fontSize:20}}>🏆 Show Final Scores</button>
            )}
          </div>
        )}

        <div style={{position:"fixed", bottom:0, left:0, right:0, display:"flex", justifyContent:"center", gap:10, padding:10, background:"#fff", borderTop:"1px solid #e2e8f0", boxShadow:"0 -2px 10px rgba(0,0,0,0.05)"}}>
          {activeTeams.map(t => { const c=TEAM_COLORS[t.color]; return <div key={t.id} style={{background:c.bg, border:"2px solid "+c.border, padding:"5px 18px", borderRadius:8, fontWeight:800, fontSize:15, color:c.dark}}>{t.name}: {t.score}</div>; })}
        </div>
      </div>
    );
  }

  // ═══════════ GAME OVER ═══════════
  if (gamePhase === "gameover") {
    const sorted = [...activeTeams].sort((a,b) => b.score-a.score);
    return (
      <div style={{...S.page, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:24, minHeight:"100vh"}}>
        <div style={{fontSize:64, marginBottom:8}}>🏆</div>
        <h1 style={{fontSize:42, fontWeight:900, letterSpacing:2, margin:"0 0 4px", background:"linear-gradient(135deg, #f97316, #eab308)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent"}}>GAME OVER</h1>
        <p style={{color:"#94a3b8", marginBottom:28}}>Total game time: {formatTime(gameTime)}</p>
        <div style={{display:"flex", flexDirection:"column", gap:12, width:"100%", maxWidth:480}}>
          {sorted.map((t,i) => { const c=TEAM_COLORS[t.color]; return (
            <div key={t.id} style={{display:"flex", alignItems:"center", gap:16, background:c.bg, borderRadius:14, padding:"14px 20px", border:"2px solid "+(i===0?c.mid:c.border), boxShadow:i===0?"0 0 24px "+c.glow:"none", transform:i===0?"scale(1.04)":"none", animation:i===0?"slideUp 0.5s ease":"slideUp 0.5s ease "+(i*0.1)+"s both"}}>
              <span style={{fontSize:26, fontWeight:900, color:c.dark, minWidth:40}}>#{i+1}</span>
              <span style={{flex:1, fontSize:20, fontWeight:700, color:c.dark}}>{t.name}</span>
              <span style={{fontSize:26, fontWeight:900, color:c.dark}}>{t.score}</span>
            </div>
          ); })}
        </div>
        <button onClick={() => { setGamePhase("setup"); setTeams(clone(DEFAULT_TEAMS)); setDifficulty("standard"); const d=["Body Systems","Cells & Life","Ecology","Earth Science","Anatomy Deep Dive"]; setSelectedCats(d); setCategories(d.map(n => buildCategory(n,"standard"))); }} style={{...S.btnGhost, marginTop:32}}>New Game</button>
      </div>
    );
  }

  // ═══════════ MAIN GAME BOARD ═══════════
  return (
    <div style={{...S.page, display:"flex", flexDirection:"column", minHeight:"100vh"}}>
      {/* Top Bar */}
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 16px", background:"#fff", borderBottom:"1px solid #e2e8f0", boxShadow:"0 1px 4px rgba(0,0,0,0.04)", flexWrap:"wrap", gap:8}}>
        <div style={{display:"flex", alignItems:"center", gap:14}}>
          <span style={{fontSize:20, fontWeight:900, letterSpacing:2, background:"linear-gradient(135deg, #2563eb, #16a34a, #dc2626, #ca8a04)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent"}}>🧬 BIO BOWL</span>
          <span style={{fontSize:12, color:"#94a3b8", background:difficulty==="easy"?"#dcfce7":"#dbeafe", padding:"2px 10px", borderRadius:20, fontWeight:700}}>{difficulty==="easy"?"🌱 Easy":"🔬 Standard"}</span>
          <span style={{fontSize:12, color:"#94a3b8"}}>{questionsAnswered}/{totalQuestions}</span>
        </div>
        <div style={{display:"flex", alignItems:"center", gap:10, flexWrap:"wrap"}}>
          <div style={{display:"flex", alignItems:"center", gap:6, background:"#f8fafc", borderRadius:8, padding:"4px 12px", border:"1px solid #e2e8f0"}}>
            <span style={{fontSize:10, color:"#94a3b8", fontWeight:700, textTransform:"uppercase"}}>Game</span>
            <span style={{fontSize:17, fontWeight:900, fontVariantNumeric:"tabular-nums", color:"#1e293b"}}>{formatTime(gameTime)}</span>
            <button onClick={() => setGameRunning(!gameRunning)} style={{background:"none", border:"none", cursor:"pointer", fontSize:13, color:gameRunning?"#ef4444":"#22c55e"}}>{gameRunning?"⏸":"▶"}</button>
          </div>
          <button onClick={() => setShowSettings(!showSettings)} style={{...S.btnGhost, padding:"4px 10px"}}>⚙</button>
          <button onClick={startFinalJeopardy} style={{background:"#fefce8", border:"1px solid #fde047", color:"#a16207", padding:"4px 10px", borderRadius:8, cursor:"pointer", fontSize:11, fontWeight:700, fontFamily:"inherit"}}>Final Jeopardy →</button>
        </div>
      </div>

      {showSettings && (
        <div style={{background:"#f8fafc", padding:"10px 16px", borderBottom:"1px solid #e2e8f0", display:"flex", flexWrap:"wrap", gap:14, alignItems:"center"}}>
          <label style={{fontSize:13, color:"#475569"}}>Q Timer:<select value={qTimerDuration} onChange={e => setQTimerDuration(Number(e.target.value))} style={{...S.select, width:"auto", marginLeft:6, padding:"3px 8px"}}>{[10,15,20,30,45,60].map(n => <option key={n} value={n}>{n}s</option>)}</select></label>
          <label style={{fontSize:13, color:"#475569", display:"flex", alignItems:"center", gap:4}}><input type="checkbox" checked={deductOnWrong} onChange={() => setDeductOnWrong(!deductOnWrong)} /> Deduct on wrong</label>
          <button onClick={() => { setGamePhase("gameover"); setGameRunning(false); }} style={{background:"#fee2e2", border:"1px solid #fca5a5", color:"#dc2626", padding:"4px 12px", borderRadius:6, cursor:"pointer", fontSize:12, fontWeight:700, fontFamily:"inherit"}}>End Game</button>
        </div>
      )}

      {/* Team Scores */}
      <div style={{display:"flex", justifyContent:"center", gap:8, padding:"10px 16px", flexWrap:"wrap"}}>
        {activeTeams.map(t => { const c=TEAM_COLORS[t.color]; return (
          <div key={t.id} style={{background:c.bg, borderRadius:12, padding:"8px 14px", minWidth:145, textAlign:"center", border:"2px solid "+c.border, boxShadow:"0 2px 10px "+c.glow, position:"relative"}}>
            <div style={{fontSize:12, fontWeight:800, letterSpacing:1, textTransform:"uppercase", color:c.dark, marginBottom:2}}>{t.name}</div>
            <div style={{fontSize:28, fontWeight:900, color:c.dark, cursor:"pointer", fontVariantNumeric:"tabular-nums"}} onClick={() => { setShowScoreEdit(t.id); setScoreEditVal(String(t.score)); }}>{t.score}</div>
            <div style={{display:"flex", gap:3, justifyContent:"center", marginTop:4}}>
              {[-100,-50,50,100].map(amt => <button key={amt} onClick={() => adjustScore(t.id, amt)} style={{background:"#fff", border:"1px solid "+c.border, color:amt<0?"#dc2626":"#16a34a", borderRadius:4, padding:"2px 7px", cursor:"pointer", fontSize:11, fontWeight:700, fontFamily:"inherit"}}>{amt>0?"+":""}{amt}</button>)}
            </div>
            {showScoreEdit===t.id && (
              <div style={{position:"absolute", top:"100%", left:"50%", transform:"translateX(-50%)", marginTop:6, background:"#fff", borderRadius:10, padding:10, zIndex:50, display:"flex", gap:6, boxShadow:"0 8px 24px rgba(0,0,0,0.15)", border:"1px solid #e2e8f0"}}>
                <input autoFocus type="number" value={scoreEditVal} onChange={e => setScoreEditVal(e.target.value)} onKeyDown={e => e.key==="Enter" && setScoreDirect(t.id, scoreEditVal)} style={{...S.input, width:80, fontWeight:800, fontSize:16, padding:"4px 8px"}} />
                <button onClick={() => setScoreDirect(t.id, scoreEditVal)} style={{background:"#22c55e", border:"none", color:"#fff", borderRadius:6, padding:"4px 10px", cursor:"pointer", fontWeight:700, fontFamily:"inherit"}}>Set</button>
                <button onClick={() => setShowScoreEdit(null)} style={{...S.btnGhost, padding:"4px 8px"}}>✕</button>
              </div>
            )}
          </div>
        ); })}
      </div>

      {/* Board */}
      <div style={{flex:1, padding:"6px 16px 16px", display:"flex", flexDirection:"column", gap:4}}>
        <div style={{display:"grid", gridTemplateColumns:"repeat("+categories.length+", 1fr)", gap:5}}>
          {categories.map((cat,ci) => <div key={ci} style={{background:"#eef2ff", border:"1px solid #c7d2fe", borderRadius:8, padding:"10px 6px", textAlign:"center", fontWeight:800, fontSize:12, textTransform:"uppercase", letterSpacing:0.8, color:"#4338ca", lineHeight:1.3}}>{cat.name}</div>)}
        </div>
        {[0,1,2,3,4].map(row => (
          <div key={row} style={{display:"grid", gridTemplateColumns:"repeat("+categories.length+", 1fr)", gap:5, flex:1}}>
            {categories.map((cat,ci) => { const q=cat.questions[row]; if(!q) return <div key={ci}/>; return (
              <button key={ci} onClick={() => openQuestion(ci,row)} disabled={q.revealed} style={{
                background:q.revealed?"#f8fafc":"#fff", border:q.revealed?"1px solid #f1f5f9":"2px solid #c7d2fe",
                borderRadius:8, cursor:q.revealed?"default":"pointer", display:"flex", alignItems:"center", justifyContent:"center",
                fontSize:22, fontWeight:900, color:q.revealed?"#e2e8f0":"#ca8a04", transition:"all 0.15s", opacity:q.revealed?0.35:1,
                minHeight:58, boxShadow:q.revealed?"none":"0 1px 4px rgba(0,0,0,0.06)", fontFamily:"inherit"
              }}>{q.revealed?"—":"$"+q.value}</button>
            ); })}
          </div>
        ))}
      </div>

      {/* ── QUESTION MODAL ── */}
      {currentQ && (
        <div style={{position:"fixed", inset:0, background:"rgba(15,23,42,0.6)", backdropFilter:"blur(4px)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:100, padding:20}}>
          <div style={{...S.card, padding:28, maxWidth:680, width:"100%", boxShadow:"0 20px 60px rgba(0,0,0,0.15)", animation:"slideUp 0.25s ease"}}>
            {currentQ.isDailyDouble && ddWagerPhase && (
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:34, fontWeight:900, color:"#ca8a04", marginBottom:8}}>⭐ DAILY DOUBLE ⭐</div>
                <p style={{color:"#94a3b8", marginBottom:16}}>Select team and place wager</p>
                <div style={{display:"flex", gap:8, justifyContent:"center", marginBottom:16, flexWrap:"wrap"}}>
                  {activeTeams.map(t => { const c=TEAM_COLORS[t.color]; return <button key={t.id} onClick={() => setSelectedTeam(t.id)} style={{background:selectedTeam===t.id?c.mid:c.bg, border:selectedTeam===t.id?"3px solid #1e293b":"2px solid "+c.border, borderRadius:8, padding:"8px 20px", color:selectedTeam===t.id?"#fff":c.dark, fontWeight:700, cursor:"pointer", fontSize:14, fontFamily:"inherit"}}>{t.name} ({t.score})</button>; })}
                </div>
                <div style={{display:"flex", alignItems:"center", gap:12, justifyContent:"center", marginBottom:20}}>
                  <span style={{fontSize:13, color:"#64748b"}}>Wager:</span>
                  <input type="range" min={0} max={ddMaxWager} step={50} value={ddWager} onChange={e => setDdWager(Number(e.target.value))} style={{width:180}} />
                  <input type="number" min={0} max={ddMaxWager} value={ddWager} onChange={e => setDdWager(Math.min(Number(e.target.value), ddMaxWager))} style={{...S.input, width:80, fontWeight:800, color:"#ca8a04", fontSize:18, textAlign:"center", padding:"6px 10px"}} />
                </div>
                <button disabled={!selectedTeam||ddWager<=0} onClick={() => setDdWagerPhase(false)} style={{...S.btnPrimary, opacity:selectedTeam&&ddWager>0?1:0.4, cursor:selectedTeam&&ddWager>0?"pointer":"not-allowed"}}>Show Question →</button>
              </div>
            )}

            {(!currentQ.isDailyDouble || !ddWagerPhase) && (<>
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12}}>
                <span style={{fontSize:12, textTransform:"uppercase", letterSpacing:1, color:"#94a3b8"}}>{categories[currentQ.ci].name} — ${currentQ.isDailyDouble?"DD ("+ddWager+")":currentQ.value}</span>
                {currentQ.isDailyDouble && <span style={{color:"#ca8a04", fontWeight:800, fontSize:13}}>⭐ DAILY DOUBLE</span>}
              </div>
              <div style={{fontSize:20, fontWeight:600, lineHeight:1.6, marginBottom:14, padding:16, background:"#f8fafc", borderRadius:10, border:"1px solid #e2e8f0", color:"#1e293b"}}>{currentQ.question}</div>
              {currentQ.imageUrl && <div style={{marginBottom:14, textAlign:"center"}}><img src={currentQ.imageUrl} alt="" style={{maxWidth:"100%", maxHeight:200, borderRadius:10, border:"1px solid #e2e8f0"}} /></div>}

              <div style={{display:"flex", alignItems:"center", justifyContent:"center", gap:12, marginBottom:14}}>
                <div style={{fontSize:34, fontWeight:900, fontVariantNumeric:"tabular-nums", color:qTimeLeft<=5&&qTimerRunning?"#dc2626":qTimeLeft<=10&&qTimerRunning?"#f97316":"#1e293b", animation:qTimeLeft<=5&&qTimerRunning?"pulse 0.5s ease-in-out infinite":"none"}}>{qTimeLeft}s</div>
                <button onClick={() => { if(!qTimerRunning) setQTimeLeft(prev => prev===0?qTimerDuration:prev); setQTimerRunning(!qTimerRunning); }} style={{...S.btnPrimary, padding:"6px 16px", fontSize:13, background:qTimerRunning?"#ef4444":"#22c55e"}}>{qTimerRunning?"⏸ Pause":"▶ Start Timer"}</button>
                <button onClick={() => { setQTimeLeft(qTimerDuration); setQTimerRunning(false); }} style={{...S.btnGhost, padding:"6px 12px", fontSize:13}}>↻ Reset</button>
              </div>

              {!showAnswer ?
                <button onClick={() => setShowAnswer(true)} style={{width:"100%", padding:10, background:"#f5f3ff", border:"1px solid #c4b5fd", borderRadius:8, color:"#7c3aed", cursor:"pointer", fontSize:14, fontWeight:700, marginBottom:14, fontFamily:"inherit"}}>Reveal Answer</button>
              : <div style={{padding:14, background:"#f0fdf4", border:"2px solid #86efac", borderRadius:10, marginBottom:14, textAlign:"center"}}>
                  <div style={{fontSize:10, textTransform:"uppercase", letterSpacing:1, color:"#94a3b8", marginBottom:4}}>Answer</div>
                  <div style={{fontSize:20, fontWeight:800, color:"#15803d"}}>{currentQ.answer}</div>
                </div>
              }

              {!currentQ.isDailyDouble && (
                <div style={{display:"flex", gap:6, justifyContent:"center", marginBottom:12, flexWrap:"wrap"}}>
                  {activeTeams.map(t => { const c=TEAM_COLORS[t.color]; return <button key={t.id} onClick={() => setSelectedTeam(t.id)} style={{background:selectedTeam===t.id?c.mid:c.bg, border:selectedTeam===t.id?"3px solid #1e293b":"2px solid "+c.border, borderRadius:8, padding:"6px 18px", color:selectedTeam===t.id?"#fff":c.dark, fontWeight:700, cursor:"pointer", fontSize:13, fontFamily:"inherit"}}>{t.name}</button>; })}
                </div>
              )}

              <div style={{display:"flex", gap:8, justifyContent:"center"}}>
                <button disabled={!selectedTeam} onClick={() => scoreAnswer(true)} style={{padding:"10px 22px", background:selectedTeam?"#22c55e":"#e2e8f0", border:"none", borderRadius:8, color:selectedTeam?"#fff":"#94a3b8", fontSize:15, fontWeight:800, cursor:selectedTeam?"pointer":"not-allowed", fontFamily:"inherit"}}>✓ Correct</button>
                <button disabled={!selectedTeam} onClick={() => scoreAnswer(false)} style={{padding:"10px 22px", background:selectedTeam?"#ef4444":"#e2e8f0", border:"none", borderRadius:8, color:selectedTeam?"#fff":"#94a3b8", fontSize:15, fontWeight:800, cursor:selectedTeam?"pointer":"not-allowed", fontFamily:"inherit"}}>✗ Incorrect</button>
                <button onClick={skipQuestion} style={{...S.btnGhost, padding:"10px 22px"}}>Skip</button>
              </div>
            </>)}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<BioBowl />);
</script>
</body>
</html>
